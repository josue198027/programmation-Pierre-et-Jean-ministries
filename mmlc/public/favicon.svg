<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#blueGrad)" stroke="url(#goldGrad)" stroke-width="4" />
  
  <!-- Cross -->
  <path d="M50 18V82" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
  <path d="M30 38H70" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Sun/Halo Rays -->
  <circle cx="50" cy="38" r="14" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="4 4" />
</svg>
